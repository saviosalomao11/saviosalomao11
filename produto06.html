<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="produto06.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <title>TECH STORE</title>

<body>
