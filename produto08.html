<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="produto08.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <title>TECH STORE</title>
</head>
<body>
    
    <header class="cabeçalho">
        <div class="nome-loja">
            <h1>TECH STORE 🏬</h1>
        </div>
        <div class="utilitários">
            <button class="carrinho">🛒</button>
        </div>
    </header>

    <main>
        <h2>
            <a class="voltar-menu" href="-home-page.html">
                ⇦ Voltar ao menu iniciar
            </a>
        </h2>

        <section class="produto-teclado">
            <img class="imagem-teclado" src="images/teclado.png" alt="Teclado Gamer RGB">
            
            <div class="informacoes-do-produto">
                <h1 class="titulo-teclado"> Teclado Gamer RGB </h1>
                <p class="avaliação">⭐ 4.8</p>
                <p class="estoque">📦 35 em estoque</p>
                <div class="Descrição">
                    <p>Descrição do produto.</p>
                    <p>Teclado mecânico com switches customizáveis e iluminação RGB.</p>
                </div>
                <h2 class="valor">R$ 699,00</h2>
                <div class="botões">
                    <button class="botao-compra">Comprar agora</button>
                    <button class="botao-carrinho"> Adicionar ao carrinho</button>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
